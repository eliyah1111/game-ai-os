interface:
  display_name: "$SPRITE_GEN"
  short_description: "Modern mobile gameplay sprites, action sheets, atlases, and animation metadata."
  default_prompt: "Use $SPRITE_GEN only. Create modern mobile casual-game sprite assets with the active Style Lock profile, no pixel art, no retro RPG styling, no AAA realism. Plan one coherent action per raw sheet, use solid #FF00FF raw backgrounds when sheet processing is needed, keep body scale and anchors consistent, split wide detached VFX into $VFX_GEN, and export transparent PNG frames, atlas metadata, animation timing, and collision suggestions."
